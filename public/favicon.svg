<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background and Glow Gradients -->
    <linearGradient id="grad-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />   <!-- Indigo-500 -->
      <stop offset="100%" stop-color="#a855f7" />  <!-- Purple-500 -->
    </linearGradient>
    <linearGradient id="grad-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#9333ea" stop-opacity="0.6" />
    </linearGradient>
    <!-- Shadow filter for glow effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- CPU Base Container (slate-950 dark background matching --bg-base) -->
  <rect x="48" y="48" width="416" height="416" rx="96" fill="#0b1329" stroke="url(#grad-accent)" stroke-width="8" filter="url(#glow)" />
  
  <!-- Outer pins of the CPU (matching --primary and --secondary accents) -->
  <g fill="url(#grad-accent)">
    <!-- Top Pins -->
    <rect x="130" y="16" width="16" height="32" rx="8" />
    <rect x="178" y="16" width="16" height="32" rx="8" />
    <rect x="226" y="16" width="16" height="32" rx="8" />
    <rect x="274" y="16" width="16" height="32" rx="8" />
    <rect x="322" y="16" width="16" height="32" rx="8" />
    <rect x="370" y="16" width="16" height="32" rx="8" />

    <!-- Bottom Pins -->
    <rect x="130" y="464" width="16" height="32" rx="8" />
    <rect x="178" y="464" width="16" height="32" rx="8" />
    <rect x="226" y="464" width="16" height="32" rx="8" />
    <rect x="274" y="464" width="16" height="32" rx="8" />
    <rect x="322" y="464" width="16" height="32" rx="8" />
    <rect x="370" y="464" width="16" height="32" rx="8" />

    <!-- Left Pins -->
    <rect x="16" y="130" width="32" height="16" rx="8" />
    <rect x="16" y="178" width="32" height="16" rx="8" />
    <rect x="16" y="226" width="32" height="16" rx="8" />
    <rect x="16" y="274" width="32" height="16" rx="8" />
    <rect x="16" y="322" width="32" height="16" rx="8" />
    <rect x="16" y="370" width="32" height="16" rx="8" />

    <!-- Right Pins -->
    <rect x="464" y="130" width="32" height="16" rx="8" />
    <rect x="464" y="178" width="32" height="16" rx="8" />
    <rect x="464" y="226" width="32" height="16" rx="8" />
    <rect x="464" y="274" width="32" height="16" rx="8" />
    <rect x="464" y="322" width="32" height="16" rx="8" />
    <rect x="464" y="370" width="32" height="16" rx="8" />
  </g>

  <!-- CPU Die / Center Core -->
  <rect x="136" y="136" width="240" height="240" rx="48" fill="#0f172a" stroke="url(#grad-accent)" stroke-width="10" />
  
  <!-- Glowing inner circuits -->
  <rect x="184" y="184" width="144" height="144" rx="28" fill="url(#grad-glow)" stroke="url(#grad-accent)" stroke-width="6" />

  <!-- Diagonal connection lines/traces in corners -->
  <path d="M 104 104 L 156 156" stroke="url(#grad-accent)" stroke-width="8" stroke-linecap="round" />
  <path d="M 408 104 L 356 156" stroke="url(#grad-accent)" stroke-width="8" stroke-linecap="round" />
  <path d="M 104 408 L 156 356" stroke="url(#grad-accent)" stroke-width="8" stroke-linecap="round" />
  <path d="M 408 408 L 356 356" stroke="url(#grad-accent)" stroke-width="8" stroke-linecap="round" />

  <!-- Center Sync Loops (representing the "Sync" and "Connection" concept) -->
  <!-- Top loop -->
  <path d="M 216 256 A 40 40 0 0 1 296 256" fill="none" stroke="#f8fafc" stroke-width="12" stroke-linecap="round" />
  <polyline points="290,266 296,256 286,250" fill="none" stroke="#f8fafc" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Bottom loop -->
  <path d="M 296 256 A 40 40 0 0 1 216 256" fill="none" stroke="#a855f7" stroke-width="12" stroke-linecap="round" />
  <polyline points="222,246 216,256 226,262" fill="none" stroke="#a855f7" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Small glowing nodes at intersections of traces -->
  <circle cx="156" cy="156" r="10" fill="#f8fafc" />
  <circle cx="356" cy="156" r="10" fill="#f8fafc" />
  <circle cx="156" cy="356" r="10" fill="#f8fafc" />
  <circle cx="356" cy="356" r="10" fill="#f8fafc" />
</svg>
